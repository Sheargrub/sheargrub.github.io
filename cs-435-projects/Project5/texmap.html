<script id="vertex-shader" type="x-shader/x-vertex">
#version 300 es

in vec4 aPosition;
in vec4 aColor;
in vec2 aTexCoord;

out vec4 vColor;
out vec2 vTexCoord;

uniform vec3 uTheta;
uniform mat4 uModelViewMatrix;

void main()
{
    vColor = aColor;
    vTexCoord = aTexCoord;
    gl_Position = uModelViewMatrix * aPosition;
}
</script>

<script id="fragment-shader" type="x-shader/x-fragment">
#version 300 es

precision mediump float;

in vec4 vColor;
in vec2 vTexCoord;

out vec4 fColor;

uniform sampler2D uTextureMap;

void
main()
{
    //fColor = vColor * texture(uTextureMap, vTexCoord);
    fColor = texture(uTextureMap, vTexCoord);
}
</script>
